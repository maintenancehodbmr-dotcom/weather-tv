<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; overflow: hidden; }
    iframe { width: 100%; height: 100vh; border: none; }

    /* นาฬิกา */
    #clock {
  position: absolute;
  top: 10px;
  right: 20px;
  font-size: 32px;
  color: #ffffff;
  font-weight: bold;
  background: rgba(0,0,0,0.5);
  padding: 8px 15px;
  border-radius: 10px;
  z-index: 9999; /* 🔥 ตัวนี้สำคัญ */
}
  </style>
</head>
<body>

  <!-- แสดงเวลา -->
  <div id="clock"></div>

  <!-- แสดง Google Sheets -->
  <iframe id="sheet"></iframe>

  <script>
    // โหลดข้อมูล (กัน cache)
    function reloadSheet() {
      const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlEV1jtGNy5llbS0o4sCX4KM_VN_iR_z7BnlKLIc_DqEv6ezepspnm-_YoHqYhIdnesgK7QGL4yjqt/pubhtml?gid=776061048&single=true&widget=true&headers=false&rand=" + new Date().getTime();
      document.getElementById("sheet").src = url;
    }

    // ตั้งเวลาให้อัปเดตตรงนาทีที่ 08
    function scheduleUpdate() {
      const now = new Date();
      const next = new Date();

      next.setMinutes(8);
      next.setSeconds(0);
      next.setMilliseconds(0);

      if (now.getMinutes() >= 8) {
        next.setHours(now.getHours() + 1);
      }

      const delay = next - now;

      setTimeout(() => {
        reloadSheet();
        setInterval(reloadSheet, 60 * 60 * 1000); // ทุก 1 ชั่วโมง
      }, delay);
    }

    // แสดงเวลาปัจจุบันบนหน้าจอ
    function updateClock() {
      const now = new Date();
      document.getElementById("clock").innerText =
        now.toLocaleTimeString();
    }

    setInterval(updateClock, 1000); // อัปเดตทุก 1 วินาที
    updateClock();

    // โหลดครั้งแรก + ตั้งเวลา
    reloadSheet();
    scheduleUpdate();
  </script>

</body>
</html>
