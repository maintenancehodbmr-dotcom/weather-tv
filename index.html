<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; }
    iframe { width: 100%; height: 100vh; border: none; }

    #clock {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 32px;
      color: red;
      font-weight: bold;
      z-index: 9999;
    }
  </style>
</head>

<body>

<div id="clock"></div>

<iframe id="sheet"
src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQlEV1jtGNy5llbS0o4sCX4KM_VN_iR_z7BnlKLIc_DqEv6ezepspnm-_YoHqYhIdnesgK7QGL4yjqt/pubhtml?gid=776061048&single=true">
</iframe>

<script>
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerHTML =
    now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

function reloadAtMinute8() {
  const now = new Date();
  const minutes = now.getMinutes();

  if (minutes === 8) {
    document.getElementById("sheet").src += "";
  }
}

// เช็คทุก 30 วินาที
setInterval(reloadAtMinute8, 30000);
</script>

</body>
</html>
